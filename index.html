<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0e1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CCS Prep"/>
<title>CCS Prep — Claude AI</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#0d1224;
  --border:#1e2d4a;--blue:#3b82f6;--blue-dark:#1d4ed8;
  --text:#cdd6f4;--muted:#8892b0;--dim:#3a4a6a;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-cross{width:80px;height:80px;position:relative;margin-bottom:24px;animation:pulse 1.5s ease-in-out infinite;}
.splash-cross::before,.splash-cross::after{content:'';position:absolute;background:var(--blue);border-radius:4px;}
.splash-cross::before{width:24px;height:72px;left:28px;top:4px;}
.splash-cross::after{width:72px;height:24px;left:4px;top:28px;}
.splash-ring{position:absolute;inset:-8px;border:2px solid var(--blue-dark);border-radius:50%;animation:spin 2s linear infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes spin{to{transform:rotate(360deg);}}
.splash-title{font-family:'DM Serif Display',serif;font-size:32px;color:#fff;letter-spacing:1px;}
.splash-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:2px;}
header{background:linear-gradient(135deg,#1a1f35,#0d1224);border-bottom:1px solid var(--border);padding:12px 18px;padding-top:calc(12px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--blue);letter-spacing:1px;}
.badge{background:#1e2d4a;border:1px solid #3a5080;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--blue);font-weight:700;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--border);}
nav{display:flex;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0;padding-bottom:var(--safe-bot);}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--dim);font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:.5px;transition:color .15s;}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:18px;}

/* HOME */
.hero{text-align:center;padding:28px 24px 16px;background:linear-gradient(180deg,#111827,var(--bg));}
.hero-cross{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;position:relative;margin-bottom:12px;}
.hero-cross::before,.hero-cross::after{content:'';position:absolute;background:var(--blue);border-radius:3px;}
.hero-cross::before{width:16px;height:50px;}
.hero-cross::after{width:50px;height:16px;}
.hero-ring{position:absolute;inset:0;border:2px solid var(--blue-dark);border-radius:50%;}
h1{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:4px;}
.hero-sub{font-size:12px;color:var(--muted);line-height:1.5;}

/* MODE CARDS */
.section-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:2px;text-transform:uppercase;padding:14px 16px 6px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.mode-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:16px 12px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
.mode-card.sel{border-color:var(--blue);background:#1a2a45;}
.mode-card-icon{font-size:28px;margin-bottom:8px;}
.mode-card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.mode-card.sel .mode-card-title{color:#7eb8f7;}
.mode-card-desc{font-size:10px;color:var(--dim);line-height:1.4;}

/* DOMAIN / SCENARIO SELECTORS */
.dom-list{display:flex;flex-direction:column;gap:8px;padding:0 14px;}
.dom-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;user-select:none;}
.dom-card.sel{background:#1e3a5f;border-color:var(--blue);}
.dom-top{display:flex;align-items:center;gap:10px;}
.dom-icon{font-size:18px;flex-shrink:0;}
.dom-label{font-size:13px;font-weight:700;color:var(--muted);flex:1;}
.dom-card.sel .dom-label{color:#7eb8f7;}
.dom-pct{font-size:10px;font-weight:700;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;flex-shrink:0;}
.dom-card.sel .dom-pct{color:#7eb8f7;border-color:#3a5080;}
.dom-tasks{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.4;display:none;}
.dom-card.sel .dom-tasks{display:block;color:#5a7aaa;}
.diff-row{display:flex;gap:8px;padding:8px 14px;}
.diff-btn{flex:1;padding:10px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--dim);font-weight:700;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
.diff-btn.easy.sel{border-color:#4ade80;background:#0d1f0d;color:#4ade80;}
.diff-btn.medium.sel{border-color:#fbbf24;background:#1f180d;color:#fbbf24;}
.diff-btn.hard.sel{border-color:#f87171;background:#1f0d0d;color:#f87171;}
.start-btn{display:block;width:calc(100% - 28px);margin:16px 14px 32px;padding:16px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 24px rgba(37,99,235,.4);}
.no-key-banner{margin:0 14px 4px;background:#1a1500;border:1px solid #3a3000;border-radius:12px;padding:12px;text-align:center;font-size:13px;color:#fbbf24;}
.no-key-btn{margin-top:8px;padding:7px 18px;background:#2a2000;border:1px solid var(--yellow);border-radius:8px;color:var(--yellow);font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;font-size:12px;}

/* QUIZ SHARED */
.quiz-body{padding:12px;}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:12px;padding:8px 14px;margin-bottom:10px;border:1px solid var(--border);}
.score-item{text-align:center;}
.score-num{font-size:20px;font-weight:700;color:#7eb8f7;font-family:'DM Serif Display',serif;}
.score-desc{font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:700;}
.context-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ctag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* DOMAIN Q MODE */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;animation:fadeUp .3s ease;}
.q-text{font-size:15px;line-height:1.65;color:var(--text);font-weight:500;}
.choice{display:flex;align-items:flex-start;gap:10px;width:100%;padding:13px;margin-bottom:8px;background:var(--surface);border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .2s;}
.choice.correct{background:#0d1f0d;border-color:var(--green);}
.choice.wrong{background:#1f0d0d;border-color:var(--red);}
.choice.dim{background:var(--bg);border-color:var(--surface);}
.choice-letter{min-width:26px;height:26px;border-radius:7px;background:var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.choice.correct .choice-letter{background:var(--green);color:#000;}
.choice.wrong .choice-letter{background:var(--red);color:#000;}
.choice-text{font-size:14px;line-height:1.5;color:var(--text);padding-top:1px;}
.choice.correct .choice-text{color:#86efac;}
.choice.wrong .choice-text{color:#fca5a5;}
.choice.dim .choice-text{color:var(--dim);}
.explanation{border-radius:12px;padding:14px;margin-top:10px;animation:fadeUp .3s ease;}
.explanation.ok{background:#0d1b0d;border:1px solid #1a3a1a;}
.explanation.ng{background:#1a0d0d;border:1px solid #3a1a1a;}
.exp-title{font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;}
.explanation.ok .exp-title{color:var(--green);}
.explanation.ng .exp-title{color:var(--red);}
.exp-text{font-size:13px;line-height:1.6;}
.explanation.ok .exp-text{color:#86efac;}
.explanation.ng .exp-text{color:#fca5a5;}
.guide-ref{font-size:11px;margin-top:6px;font-style:italic;}
.explanation.ok .guide-ref{color:var(--green);}
.explanation.ng .guide-ref{color:var(--red);}
.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(37,99,235,.3);}

/* MEDICAL SCENARIO MODE */
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.case-header{background:#0d1a2e;border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.case-title{font-family:'DM Serif Display',serif;font-size:15px;color:#7eb8f7;}
.case-setting{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;}
.case-docs{padding:14px;max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.case-docs::-webkit-scrollbar{width:3px;}
.case-docs::-webkit-scrollbar-thumb{background:var(--border);}
.doc-section{margin-bottom:14px;}
.doc-section-title{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px;}
.doc-line{font-size:12px;line-height:1.6;color:var(--muted);}
.doc-label{font-weight:700;color:var(--text);}
.case-hint{text-align:center;padding:6px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);}
.sub-q-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sub-q-num{background:var(--blue-dark);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sub-q-type{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;}
.q-progress{display:flex;gap:6px;margin-bottom:12px;}
.q-dot{flex:1;height:4px;border-radius:2px;background:var(--border);}
.q-dot.done{background:var(--green);}
.q-dot.active{background:var(--blue);}

/* LOAD / ERROR */
.load-box{text-align:center;padding:50px 20px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top:3px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
.load-text{color:var(--muted);font-size:14px;}
.error-box{background:#1a0d0d;border:1px solid #5a1a1a;border-radius:12px;padding:18px;text-align:center;color:var(--red);margin:16px 0;font-size:13px;line-height:1.6;}
.retry-btn{margin-top:10px;padding:9px 22px;background:#2a1a1a;border:1px solid var(--red);border-radius:8px;color:var(--red);font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}

/* HISTORY / STATS */
.hist-body{padding:12px 14px 20px;}
.hist-item{background:var(--surface);border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.hist-item.c{border:1px solid #1a3a1a;border-left:3px solid var(--green);}
.hist-item.w{border:1px solid #3a1a1a;border-left:3px solid var(--red);}
.hist-q{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:4px;}
.hist-meta{font-size:10px;color:var(--dim);}
.empty-state{text-align:center;padding:50px 20px;color:var(--dim);}
.stats-body{padding:12px 14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;text-align:center;}
.stat-big{font-family:'DM Serif Display',serif;font-size:44px;color:var(--blue);}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;font-weight:700;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat-small{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.stat-med{font-family:'DM Serif Display',serif;font-size:30px;}
.progress-bar{background:var(--border);border-radius:99px;height:6px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue-dark),var(--blue));transition:width .6s ease;}
.domain-row{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);}
.domain-row.weak{border-left:3px solid var(--red);}
.domain-row.mid{border-left:3px solid var(--yellow);}
.domain-row.ok{border-left:3px solid var(--green);}
.domain-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.domain-name{font-size:12px;font-weight:700;color:var(--text);flex:1;margin-right:8px;}
.domain-acc{font-family:'DM Serif Display',serif;font-size:22px;}
.domain-count{font-size:10px;color:var(--dim);margin-top:1px;}
.diff-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.diff-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.diff-pill.easy{border-color:#4ade8066;color:#4ade80;}
.diff-pill.medium{border-color:#fbbf2466;color:#fbbf24;}
.diff-pill.hard{border-color:#f8717166;color:#f87171;}

/* KEY SCREEN */
.key-screen{padding:28px 20px;display:flex;flex-direction:column;gap:14px;}
.key-hero{text-align:center;padding:16px 0;}
.key-icon{font-size:48px;display:block;margin-bottom:10px;}
.key-title{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:6px;}
.key-sub{font-size:12px;color:var(--muted);line-height:1.6;}
.key-steps{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.key-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
.key-step:last-child{margin-bottom:0;}
.step-num{min-width:24px;height:24px;background:var(--blue-dark);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.step-text{font-size:12px;color:var(--muted);line-height:1.5;}
.step-text a{color:var(--blue);text-decoration:none;}
.key-input-wrap{position:relative;}
.key-input{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:13px 46px 13px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.key-input:focus{border-color:var(--blue);}
.key-input::placeholder{color:var(--dim);}
.key-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;}
.key-save{width:100%;padding:14px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.4);}
.key-save:disabled{opacity:.5;cursor:not-allowed;}
.key-note{font-size:11px;color:var(--dim);text-align:center;line-height:1.5;}
.key-saved{background:#0d1f0d;border:1px solid #1a3a1a;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#86efac;}
.key-clear{margin-left:auto;background:none;border:1px solid #3a1a1a;border-radius:6px;padding:3px 9px;color:var(--red);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.choice-reason{font-size:11px;color:var(--red);margin-top:3px;font-style:italic;opacity:.85;}
#pf-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);margin-left:6px;vertical-align:middle;animation:pulse .9s ease-in-out infinite;}

/* ── DESKTOP (≥768px) ────────────────────────────────────────────────────── */
@media(min-width:768px){
  /* Layout: CSS grid — sidebar nav + header/content */
  #app{
    max-width:none;
    display:grid;
    grid-template-columns:220px 1fr;
    grid-template-rows:auto 1fr;
  }
  header{
    grid-column:2;grid-row:1;
    padding:16px 32px;
  }
  #content{
    grid-column:2;grid-row:2;
    overflow-y:auto;
  }
  /* Sidebar nav */
  nav{
    grid-column:1;grid-row:1/3;
    flex-direction:column;
    height:100dvh;
    position:sticky;top:0;
    border-right:1px solid var(--border);border-top:none;
    padding:0 0 16px;
    gap:2px;
    overflow-y:auto;
  }
  nav::before{
    content:'CCS PREP';
    font-family:'DM Serif Display',serif;
    font-size:17px;color:var(--blue);letter-spacing:1px;
    display:block;
    padding:20px 18px 16px;
    border-bottom:1px solid var(--border);
    margin-bottom:8px;
  }
  .nav-btn{
    flex-direction:row;justify-content:flex-start;
    padding:10px 16px;gap:12px;
    font-size:12px;letter-spacing:.5px;
    border-radius:8px;margin:0 8px;
    flex:none;width:calc(100% - 16px);
  }
  .nav-icon{font-size:17px;}
  .logo{display:none;} /* sidebar replaces mobile header logo */

  /* Content padding */
  .quiz-body{padding:20px 32px;max-width:900px;}
  .stats-body{padding:20px 32px;max-width:900px;}
  .hist-body{padding:20px 32px 40px;max-width:900px;}
  .hero{padding:44px 48px 24px;}
  .section-label{padding:20px 32px 8px;}
  .mode-grid{padding:0 32px;grid-template-columns:1fr 1fr 1fr;}
  .dom-list,.diff-row{padding:0 32px;}
  .start-btn{width:calc(100% - 64px);margin:16px 32px 40px;}
  .key-screen{padding:40px;max-width:560px;margin:0 auto;}
  .no-key-banner{margin:0 32px 4px;}

  /* Slightly larger type */
  .q-text{font-size:16px;}
  .choice-text{font-size:15px;}

  /* Stats — domain rows in 2-col grid */
  .domains-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .settings-grid{grid-template-columns:1fr 1fr 1fr;}

  /* Med Scenario — docs left, Q right */
  .ms-quiz-body{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:24px;
    max-width:none;
    padding:20px 32px;
  }
  .ms-quiz-body .score-bar{grid-column:1/-1;}
  .ms-quiz-body .context-tags{grid-column:1/-1;}
  .ms-quiz-body .controls-bar{grid-column:1/-1;}
  .ms-quiz-body .case-card{
    grid-column:1;
    position:sticky;top:12px;
    max-height:calc(100dvh - 130px);
    display:flex;flex-direction:column;
  }
  .ms-quiz-body .case-docs{
    flex:1;overflow-y:auto;
    max-height:none;
  }
  .ms-quiz-body .case-hint{display:none;}
  .ms-right{grid-column:2;}
}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-cross"><div class="splash-ring"></div></div>
  <div class="splash-title">CCS PREP</div>
  <div class="splash-sub">AI · EXAM PRACTICE</div>
</div>
<div id="app">
  <header>
    <span class="logo">CCS PREP</span>
    <span class="badge" id="header-badge">Gemini AI</span>
  </header>
  <div id="content"></div>
  <nav>
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')"><span class="nav-icon">⚙️</span>SETUP</button>
    <button class="nav-btn" id="nav-dq" onclick="navigate('dq')"><span class="nav-icon">📚</span>DOMAIN Q</button>
    <button class="nav-btn" id="nav-ms" onclick="navigate('ms')"><span class="nav-icon">🏥</span>MED SCENARIO</button>
    <button class="nav-btn" id="nav-stats" onclick="navigate('stats')"><span class="nav-icon">📊</span>STATS</button>

async function _callClaude(payload){
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  const raw=data.content?.[0]?.text||'';
  if(!raw) throw new Error('Empty response');
  const clean=raw.replace(/```json|```/g,'').trim();
  const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
  if(s===-1||e===-1) throw new Error('No JSON in response');
  return JSON.parse(clean.slice(s,e+1));
}

async function prefetchDomainQ(){
  if(_pf.dqBusy) return;

    const dom=DOMAINS.find(d=>d.id===domainId);
    const q=await _callClaude({apiKey:key,model:'claude-sonnet-4-5',max_tokens:1500,temperature:0,
      system:DQ_SYS,messages:[{role:'user',content:DQ_PROMPT(dom.label,dom.tasks,diff,_randTopic())}]});
    _pf.dq={question:q,domainId,diff};
  }catch(e){ _pf.dq=null; }

}

  S.score.correct+=correct?1:0;S.score.total+=1;

    settingId:S.msSetting,tag:setIcon(S.msSetting)+' '+setLabel(S.msSetting)+' – '+q.type,

    let cls='';
    if(revealed){cls=l===correct?'correct':l===selected?'wrong':'dim';}
    const reason=revealed&&l!==correct&&wrongReasons?.[l]
      ?`<div class="choice-reason">${wrongReasons[l]}</div>`:'';
    return `<button class="choice ${cls}" onclick="${onSelect}('${l}')">
      <span class="choice-letter">${l}</span>
      <div style="flex:1"><span class="choice-text">${choices[l]}</span>${reason}</div>
    </button>`;
  }).join('');
}

function renderExplanation(revealed,selected,correct,explanation,guideline_ref){
  if(!revealed) return '';
  const ok=selected===correct;
  return `<div class="explanation ${ok?'ok':'ng'}">
    <div class="exp-title">${ok?'✓ CORRECT':'✗ INCORRECT'}</div>
    <div class="exp-text">${explanation}</div>
    ${guideline_ref?`<div class="guide-ref">📖 ${guideline_ref}</div>`:''}
  </div>`;
}

// ── SESSION MODE ──────────────────────────────────────────────────────────────
let _sessSetupOpen=false, _sessConfigCount=10, _sessConfigDiff='Medium';

const SESSION_FEEDBACK=[
  {min:90,grade:'A',color:'var(--green)', label:'Excellent',  advice:'Solid command of this domain. Try Hard difficulty to sharpen edge cases.'},
  {min:75,grade:'B',color:'#86efac',      label:'Good',       advice:'Good foundation. Review missed questions and focus on guideline references.'},
  {min:60,grade:'C',color:'var(--yellow)',label:'Needs Work',  advice:'Review ICD-10 Official Guidelines for the areas where you missed. Try Medium difficulty again.'},
  {min:0, grade:'D',color:'var(--red)',   label:'Study Needed',advice:'Focus on missed topics before moving harder. Review AHIMA coding guidelines section by section.'},
];

function startSession(){
  const domain=document.getElementById('sess-domain')?.value||S.dqDomain;
  const bodySystem=document.getElementById('sess-body')?.value||null;
  S.dqSession={domain,bodySystem,diff:_sessConfigDiff,total:_sessConfigCount,current:0,results:[],phase:'active'};
  S.dqDomain=domain; S.dqDiff=_sessConfigDiff; S.dqBodySystem=bodySystem||null;
  S.dqQuestion=null; S.dqSelected=null; S.dqRevealed=false; S.dqError=null; _pf.dq=null;
  _sessSetupOpen=false;
  loadDomainQ();
}

function dqSessionNext(){
  const sess=S.dqSession;
  sess.current+=1;
  if(sess.current>=sess.total){sess.phase='summary';_pf.dq=null;renderContent();return;}
  dqNext();
}

function exitSession(){
  S.dqSession=null; S.dqQuestion=null; S.dqSelected=null; S.dqRevealed=false; S.dqError=null; _pf.dq=null;
  renderContent();
}

function startNewSession(){
  const prev=S.dqSession;
  S.dqSession={domain:prev.domain,bodySystem:prev.bodySystem,diff:prev.diff,total:prev.total,current:0,results:[],phase:'active'};
  S.dqDomain=prev.domain; S.dqDiff=prev.diff; S.dqBodySystem=prev.bodySystem;
  S.dqQuestion=null; S.dqSelected=null; S.dqRevealed=false; S.dqError=null; _pf.dq=null;
  loadDomainQ();
}

function _sessSetupDiff(d){
  _sessConfigDiff=d;
  ['Easy','Medium','Hard'].forEach(x=>{
    const b=document.getElementById('sess-diff-'+x); if(!b) return;
    b.className=`diff-btn ${x.toLowerCase()}${x===d?' sel':''}`;
  });
}

function _sessSetupCount(n){
  _sessConfigCount=n;
  [5,10,15,20].forEach(x=>{
    const b=document.getElementById('sess-n-'+x); if(!b) return;
    b.style.borderColor=x===n?'var(--blue)':'var(--border)';
    b.style.color=x===n?'var(--blue)':'var(--dim)';
    b.style.background=x===n?'#1a2a45':'var(--surface)';
  });
}

function renderSessionSetupPanel(){
  const open=_sessSetupOpen;
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;">

      <span>🎯 Session Mode</span>
      <span style="font-size:11px;color:var(--dim)">${open?'▲ Hide':'▾ Configure'}</span>
    </button>
    ${open?`<div style="padding:0 14px 14px;border-top:1px solid var(--border);">
      <div class="section-label" style="padding:10px 0 6px;">Domain</div>
      <select id="sess-domain" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:10px;">
        ${DOMAINS.map(d=>`<option value="${d.id}" ${S.dqDomain===d.id?'selected':''}>${d.icon} ${d.label} (${d.pct})</option>`).join('')}
      </select>
      <div class="section-label" style="padding:0 0 6px;">Body System (optional)</div>
      <select id="sess-body" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:10px;">
        <option value="">All Body Systems (random)</option>
        ${Object.keys(DQ_TOPIC_MAP).map(s=>`<option value="${s}" ${S.dqBodySystem===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <div class="section-label" style="padding:0 0 6px;">Difficulty</div>
      <div class="diff-row" style="padding:0 0 10px;">
        ${['Easy','Medium','Hard'].map(d=>`<button id="sess-diff-${d}" class="diff-btn ${d.toLowerCase()}${_sessConfigDiff===d?' sel':''}" onclick="_sessSetupDiff('${d}')">${d}</button>`).join('')}

      <div class="section-label" style="padding:0 0 6px;">Questions</div>

      </div>
      <button onclick="startSession()" class="start-btn" style="margin:0;width:100%;">Start ${_sessConfigCount}-Question Session →</button>
    </div>`:''}
  </div>`;
}

function renderSessionProgress(){
  const sess=S.dqSession;
  const dots=Array.from({length:sess.total},(_,i)=>{
    if(i<sess.results.length) return `<div class="q-dot${sess.results[i].correct?' done':''}" style="${!sess.results[i].correct?'background:var(--red);border-color:var(--red)':''}"></div>`;
    if(i===sess.current) return `<div class="q-dot active"></div>`;
    return `<div class="q-dot"></div>`;
  }).join('');
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <span style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1px;">SESSION Q${sess.current+1} OF ${sess.total}</span>
    <button onclick="exitSession()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--dim);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;">✕ Exit</button>
  </div>
  <div class="q-progress" style="margin-bottom:10px;">${dots}</div>`;
}

function renderSessionSummary(){
  const sess=S.dqSession;
  const results=sess.results;
  const correctCount=results.filter(r=>r.correct).length;
  const acc=Math.round(correctCount/sess.total*100);
  const fb=SESSION_FEEDBACK.find(f=>acc>=f.min);

  const bySystem={};
  results.forEach(r=>{
    const key=r.bodySystem?r.bodySystem.split(' (')[0]:'Mixed';
    if(!bySystem[key]) bySystem[key]={correct:0,total:0};
    bySystem[key].total+=1; bySystem[key].correct+=r.correct?1:0;
  });
  const weakRows=Object.entries(bySystem).filter(([,v])=>v.correct<v.total)
    .sort((a,b)=>(a[1].correct/a[1].total)-(b[1].correct/b[1].total))
    .map(([sys,data])=>{
      const p=Math.round(data.correct/data.total*100);
      const col=p<60?'var(--red)':'var(--yellow)';
      return `<div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid ${col};border-radius:10px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:700;color:var(--text);">🫀 ${sys}</span>
          <span style="font-size:13px;font-weight:700;color:${col};">${p}% (${data.correct}/${data.total})</span>
        </div>
        <div style="background:var(--border);border-radius:99px;height:4px;overflow:hidden;">
          <div style="height:100%;width:${p}%;background:${col};border-radius:99px;"></div>
        </div>
      </div>`;
    }).join('');

  const breakdownRows=results.map((r,i)=>`
    <div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);">
      <span style="min-width:26px;height:26px;border-radius:50%;background:${r.correct?'#0d1f0d':'#1f0d0d'};border:1.5px solid ${r.correct?'var(--green)':'var(--red)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${r.correct?'var(--green)':'var(--red)'};flex-shrink:0;">${r.correct?'✓':'✗'}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">Q${i+1}: ${r.question}</div>
        ${!r.correct?`<div style="font-size:11px;color:var(--dim);margin-top:2px;">Your: ${r.user_answer} · Correct: ${r.correct_answer}</div>`:''}
      </div>
    </div>`).join('');

  const domLabel2=domLabel(sess.domain), domIc=domIcon(sess.domain);
  return `<div class="quiz-body" style="padding-bottom:40px;">
    <div style="text-align:center;padding:20px 0 10px;">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--dim);margin-bottom:8px;">SESSION COMPLETE</div>
      <div style="font-family:'DM Serif Display',serif;font-size:56px;font-weight:700;color:${fb.color};line-height:1;">${acc}%</div>
      <div style="font-size:14px;color:var(--muted);margin-top:4px;">${correctCount} of ${sess.total} correct</div>
      <div style="margin-top:8px;display:inline-block;background:${fb.color}22;border:1px solid ${fb.color}55;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:${fb.color};">${fb.label}</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;">
      <span class="ctag" style="background:#7eb8f722;color:#7eb8f7;">${domIc} ${domLabel2}</span>
      ${sess.bodySystem?`<span class="ctag" style="background:#a78bfa22;color:#a78bfa;">🫀 ${sess.bodySystem.split(' (')[0]}</span>`:''}
      <span class="ctag" style="background:${diffColor(sess.diff)}22;color:${diffColor(sess.diff)};">${sess.diff}</span>
    </div>
    <div class="q-card" style="border-left:3px solid ${fb.color};background:${fb.color}0d;margin-bottom:10px;">
      <div style="font-size:10px;font-weight:700;color:${fb.color};letter-spacing:1px;margin-bottom:6px;">💡 STUDY FOCUS</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;">${fb.advice}</div>
    </div>
    ${weakRows?`<div class="section-label">Areas to Review</div>${weakRows}`:''}
    <div class="section-label">Question Breakdown</div>
    <div class="q-card">${breakdownRows}</div>
    <button class="next-btn" onclick="startNewSession()" style="margin-bottom:8px;">🔄 Start New Session</button>
    <button onclick="exitSession()" style="width:100%;padding:13px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;">← Back to Free Play</button>
  </div>`;
}

function renderSessionActiveView(){
  const sess=S.dqSession;
  const isLast=sess.current+1>=sess.total;
  const ctags=`<div class="context-tags">
    <span class="ctag" style="background:${diffColor(sess.diff)}22;color:${diffColor(sess.diff)}">${sess.diff}</span>
    <span class="ctag" style="background:#7eb8f722;color:#7eb8f7">${domIcon(sess.domain)} ${domLabel(sess.domain)}</span>

  if(S.dqLoading) return `<div class="quiz-body">${renderSessionProgress()}${ctags}<div class="load-box"><div class="spinner"></div><div class="load-text">Generating question…</div></div></div>`;
  if(S.dqError&&!S.dqQuestion) return `<div class="quiz-body">${renderSessionProgress()}${ctags}<div class="error-box">${S.dqError.replace(/\n/g,'<br/>')}<br/><button class="retry-btn" onclick="S.dqError=null;loadDomainQ()">Try Again</button></div></div>`;

  return `<div class="quiz-body">
    ${renderSessionProgress()}${ctags}
    <div class="q-card">
      ${q.scenario?`<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:11px;margin-bottom:11px;font-size:13px;color:var(--muted);line-height:1.6;font-style:italic;">${q.scenario}</div>`:''}
      <div class="q-text">${q.question}</div>

    ${renderChoices(q.choices,S.dqRevealed,S.dqSelected,q.correct,'dqSelect',q.wrong_reasons)}
    ${renderExplanation(S.dqRevealed,S.dqSelected,q.correct,q.explanation,q.guideline_ref)}
    ${S.dqRevealed?`<button class="next-btn" onclick="dqSessionNext()">${isLast?'Finish Session →':'Next Question →'}</button>`:''}
  </div>`;
}

      <div class="q-text">${q.question}</div>

      ${['Easy','Medium','Hard'].map(d=>`<option value="${d}" ${S.msDiff===d?'selected':''}>${d}</option>`).join('')}
    </select>
    <button onclick="S.msExamMode=!S.msExamMode;render()" style="background:${S.msExamMode?'#1d3a5f':'var(--surface)'};border:1px solid ${S.msExamMode?'var(--blue)':'var(--border)'};border-radius:8px;padding:7px 10px;color:${S.msExamMode?'#7eb8f7':'var(--dim)'};font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:700;white-space:nowrap;">🎲 Exam</button>
  </div>`;

  if(!S.msCase) return `<div class="quiz-body">${setupHtml}${controls}</div>`;

  const c=S.msCase;
  const qi=S.msQIndex;
  const q=c.questions[qi];
  const total=c.questions.length;

  // Render documents
  const docsHtml=c.documents.map(doc=>`
    <div class="doc-section">
      <div class="doc-section-title">${doc.section}</div>
      ${doc.content.split('\\n').map(line=>{
        const colonIdx=line.indexOf(':');
        if(colonIdx>0&&colonIdx<40&&line===line.trimStart()){
          return `<div class="doc-line"><span class="doc-label">${line.slice(0,colonIdx)}:</span>${line.slice(colonIdx+1)}</div>`;
        }
        return `<div class="doc-line">${line}</div>`;
      }).join('')}
    </div>`).join('');

  // Q progress dots
  const dots=c.questions.map((_,i)=>
    `<div class="q-dot ${i<qi?'done':i===qi?'active':''}"></div>`).join('');

  return `<div class="quiz-body ms-quiz-body">
    ${setupHtml}${controls}
    <div class="case-card">
      <div class="case-header">
        <span class="case-title">${c.case_title}</span>
        <span class="case-setting">${setIcon(S.msSetting)} ${c.setting}</span>
      </div>
      <div class="case-docs">${docsHtml}</div>
      <div class="case-hint">↕ Scroll to read full documents</div>
    </div>
    <div class="ms-right">
      <div class="q-progress">${dots}</div>
      <div class="sub-q-header">
        <div class="sub-q-num">Q${qi+1}</div>
        <div class="sub-q-type">${q.type}</div>
      </div>
      <div class="q-card"><div class="q-text">${q.question}</div></div>
      ${renderChoices(q.choices,S.msRevealed[qi],S.msAnswers[qi],q.correct,'msSelect',q.wrong_reasons)}
      ${renderExplanation(S.msRevealed[qi],S.msAnswers[qi],q.correct,q.explanation,q.guideline_ref)}
      ${S.msRevealed[qi]?`<button class="next-btn" onclick="msNext()">${qi<total-1?'Next Sub-Question →':'New Case →'}</button>`:''}
    </div>
  </div>`;
}

function domainRowHtml(label, icon, items){
  if(!items.length) return '';
  const acc=Math.round(items.filter(h=>h.correct).length/items.length*100);
  const cls=acc<70?'weak':acc<85?'mid':'ok';
  const accColor=acc<70?'var(--red)':acc<85?'var(--yellow)':'var(--green)';
  const pills=['Easy','Medium','Hard'].map(d=>{
    const sub=items.filter(h=>h.diff===d);
    if(!sub.length) return '';
    const p=Math.round(sub.filter(h=>h.correct).length/sub.length*100);
    return `<span class="diff-pill ${d.toLowerCase()}">${d} ${p}% <span style="opacity:.6">(${sub.length})</span></span>`;
  }).join('');
  return `<div class="domain-row ${cls}">
    <div class="domain-header">
      <div class="domain-name">${icon} ${label}</div>
      <div style="text-align:right">
        <div class="domain-acc" style="color:${accColor}">${acc}%</div>
        <div class="domain-count">${items.length} answered${acc<70?' · ⚠️ Focus here':''}</div>
      </div>
    </div>
    <div style="background:var(--border);border-radius:99px;height:4px;overflow:hidden;margin-bottom:7px;">
      <div style="height:100%;border-radius:99px;width:${acc}%;background:${accColor};transition:width .5s;"></div>
    </div>
    <div class="diff-pills">${pills}</div>
  </div>`;
}

function renderStats(){
  const h=S.history;
  const total=h.length, correct=h.filter(x=>x.correct).length;
  const acc=total>0?Math.round(correct/total*100):0;
  const accColor=acc<70?'var(--red)':acc<85?'var(--yellow)':'var(--blue)';

  const domainRows=DOMAINS.map(d=>
    domainRowHtml(d.label,d.icon,h.filter(x=>x.mode==='Domain Q'&&x.domainId===d.id))
  ).join('');

  const settingRows=SETTINGS.map(s=>
    domainRowHtml(s.label,s.icon,h.filter(x=>x.mode==='Med Scenario'&&x.settingId===s.id))
  ).join('');

  const histHtml=!h.length
    ?`<div class="empty-state"><div style="font-size:44px;margin-bottom:10px">📝</div><div>No answers yet. Start practicing!</div></div>`
    :h.map((x,i)=>`
      <div class="hist-item ${x.correct?'c':'w'}" onclick="openHistDetail(${i})" style="cursor:pointer;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="hist-q" style="flex:1">${x.question}</div>
          <span style="font-size:14px;color:var(--dim);flex-shrink:0;">›</span>
        </div>
        <div class="hist-meta">${x.correct?'✓ Correct':'✗ Wrong (your: '+x.answer+' · correct: '+x.correctAnswer+')'} · ${x.diff} · ${x.tag||''}</div>
      </div>`).join('');

  return `<div class="stats-body">
    <div class="section-label">Overall</div>
    <div class="stat-card">
      <div class="stat-big" style="color:${accColor}">${acc}%</div>
      <div class="stat-label">OVERALL ACCURACY</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${acc}%;background:${accColor}"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-small"><div class="stat-med" style="color:#7eb8f7">${total}</div><div class="stat-label">ANSWERED</div></div>
      <div class="stat-small"><div class="stat-med" style="color:#fbbf24">🔥${S.bestStreak}</div><div class="stat-label">BEST STREAK</div></div>
    </div>

    ${domainRows?`<div class="section-label">Domain Q — by Domain</div><div class="domains-grid">${domainRows}</div>`:''}
    ${settingRows?`<div class="section-label">Med Scenario — by Setting</div><div class="domains-grid settings-grid">${settingRows}</div>`:''}

    <div class="section-label">Answer History (${h.length})</div>
    <div class="hist-body" style="padding:0 0 12px;">${histHtml}</div>
    ${h.length?`
    <div style="padding:0 14px 40px;">
      <button onclick="clearHistory()" style="width:100%;padding:13px;background:#1a0d0d;border:1.5px solid var(--red);border-radius:12px;color:var(--red);font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:.5px;">
        🗑 Clear All History
      </button>
    </div>`:''}
  </div>`;
}

function renderKeyScreen(){
  const saved=getKey();
  const masked=saved?saved.slice(0,8)+'••••••••••••'+saved.slice(-4):'';
  return `<div class="key-screen">
    <div class="key-hero"><span class="key-icon">🔑</span><div class="key-title">Gemini API Key</div><p class="key-sub">Stored only on this device.<br/>Sent only to Anthropic's API.</p></div>
    ${saved?`
      <div class="key-saved"><span>✓ Key saved: ${masked}</span><button class="key-clear" onclick="clearKey();render()">Remove</button></div>
      <button class="key-save" onclick="navigate('home')">Go to Practice →</button>
    `:`
      <div class="key-steps">
        <div class="key-step"><span class="step-num">1</span><span class="step-text">Go to <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></span></div>
        <div class="key-step"><span class="step-num">2</span><span class="step-text">Sign up / sign in → add $10–20 credit (no subscription)</span></div>
        <div class="key-step"><span class="step-num">3</span><span class="step-text">Go to <b style="color:var(--text)">API Keys</b> → Create Key</span></div>
        <div class="key-step"><span class="step-num">4</span><span class="step-text">Copy and paste below (starts with sk-ant-...)</span></div>
      </div>
      <div class="key-input-wrap">
        <input class="key-input" id="key-field" type="password" placeholder="sk-ant-..."
          oninput="document.getElementById('save-btn').disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter')saveKeyAndGo()"/>
        <button class="key-toggle" onclick="var f=document.getElementById('key-field');f.type=f.type==='password'?'text':'password'">👁</button>
      </div>
      <button class="key-save" id="save-btn" disabled onclick="saveKeyAndGo()">Save & Start Practicing</button>
      <p class="key-note">Claude Sonnet · Pay per use · stored only on this device</p>
    `}
  </div>`;
}

function histNoop(){}
function openHistDetail(i){
  S.histDetailIdx=i;
  S.screen='histdetail';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  renderContent();
}

function renderHistDetail(){
  const x=S.history[S.histDetailIdx];
  if(!x) return `<div class="quiz-body"><button class="retry-btn" onclick="navigate('stats')">← Back</button></div>`;
  const ok=x.correct;

  const backBtn=`<button onclick="navigate('stats')" style="background:none;border:none;color:var(--blue);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;padding:0 0 14px;display:flex;align-items:center;gap:6px;">← Back to Stats</button>`;

  const resultTag=`<div class="context-tags">
    <span class="ctag" style="background:${ok?'#4ade8022':'#f8717122'};color:${ok?'var(--green)':'var(--red)'}">${ok?'✓ Correct':'✗ Incorrect'}</span>
    <span class="ctag" style="background:${diffColor(x.diff)}22;color:${diffColor(x.diff)}">${x.diff}</span>
    <span class="ctag" style="background:#7eb8f722;color:#7eb8f7">${x.tag||''}</span>
  </div>`;

  const choicesHtml=renderChoices(x.choices,true,x.answer,x.correctAnswer,'histNoop',x.wrong_reasons);
  const explanationHtml=renderExplanation(true,x.answer,x.correctAnswer,x.explanation,x.guideline_ref);

  // ── Domain Q view ──
  if(x.mode==='Domain Q'){
    return `<div class="quiz-body" style="padding-bottom:40px;">
      ${backBtn}${resultTag}
      <div class="q-card">
        ${x.scenario?`<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:11px;margin-bottom:11px;font-size:13px;color:var(--muted);line-height:1.6;font-style:italic;">${x.scenario}</div>`:''}
        <div class="q-text">${x.question}</div>
      </div>
      ${choicesHtml}
      ${explanationHtml}
    </div>`;
  }

  // ── Med Scenario view ──
  const docsHtml=(x.documents||[]).map(doc=>`
    <div class="doc-section">
      <div class="doc-section-title">${doc.section}</div>
      ${doc.content.split('\\n').map(line=>{
        const ci=line.indexOf(':');
        if(ci>0&&ci<40&&line===line.trimStart())
          return `<div class="doc-line"><span class="doc-label">${line.slice(0,ci)}:</span>${line.slice(ci+1)}</div>`;
        return `<div class="doc-line">${line}</div>`;
      }).join('')}
    </div>`).join('');

  return `<div class="quiz-body ms-quiz-body" style="padding-bottom:40px;">
    <div style="grid-column:1/-1">${backBtn}${resultTag}</div>
    <div class="case-card">
      <div class="case-header">
        <span class="case-title">${x.case_title||''}</span>
        <span class="case-setting">${setIcon(x.settingId)} ${setLabel(x.settingId)}</span>
      </div>
      <div class="case-docs">${docsHtml}</div>
    </div>
    <div class="ms-right">
      <div class="sub-q-header">
        <div class="sub-q-num">Q${x.qnum||''}</div>
        <div class="sub-q-type">${x.qtype||''}</div>
      </div>
      <div class="q-card"><div class="q-text">${x.question}</div></div>
      ${choicesHtml}
      ${explanationHtml}
    </div>
  </div>`;
}

let _clearPending=false;
function clearHistory(){
  if(!_clearPending){
    _clearPending=true;
    const btn=document.querySelector('[onclick="clearHistory()"]');
    if(btn){btn.textContent='⚠️ Tap again to confirm clear';btn.style.background='#2a1000';btn.style.borderColor='#f87171';}
    setTimeout(()=>{_clearPending=false;renderContent();},3000);
    return;
  }
  _clearPending=false;
  S.history=[];S.score={correct:0,total:0};S.streak=0;S.bestStreak=0;
  saveHistory();render();
}

function saveKeyAndGo(){
  const val=document.getElementById('key-field')?.value?.trim();
  if(!val) return;
  saveKey(val);navigate('home');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function updateCountdown(){
  const exam=new Date('2026-06-20T08:00:00');
  const now=new Date();
  const diff=exam-now;
  const el=document.getElementById('countdown-banner');
  if(el){
    if(diff<=0){el.textContent='🎓 Exam Day! Good luck!';}
    else{
      const days=Math.floor(diff/86400000);
      const hrs=Math.floor((diff%86400000)/3600000);
      el.innerHTML=`⏳ ${days} days ${hrs} hrs until CCS Exam — June 20, 2026`;
    }
  }
}
setInterval(updateCountdown,60000);

window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>document.getElementById('splash').remove(),600);
  },1800);
  if(!getKey()) S.screen='key';
  document.getElementById('nav-'+(S.screen==='key'?'key':S.screen))?.classList.add('active');
  render();
  updateCountdown();
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
